name: Mirror Magna Carta to Google Doc

on:
  push:
    paths:
      - 'OKKA_Magna_Carta.md'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update llms.txt with latest commit SHA
        run: |
          SHA=$(git rev-parse HEAD)
          sed -i "s|GitHub: https://raw.githubusercontent.com/.*OKKA_Magna_Carta.md|GitHub: https://raw.githubusercontent.com/v-ravenheart/okka-magna-carta/${SHA}/OKKA_Magna_Carta.md|" llms.txt
          git config user.name "OKKA Cowork Bot"
          git config user.email "its.v@okka.ai"
          git add llms.txt
          git diff --staged --quiet || git commit -m "Auto-update llms.txt with commit SHA ${SHA}"
          git push

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Update Google Doc
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python3 << 'EOF'
          import os, json
          from googleapiclient.discovery import build
          from google.oauth2 import service_account
          DOC_ID = '1EjmQHD2puGfntK-hesuLt-F9W28y8xM8-h06mdqjAJw'
          with open('OKKA_Magna_Carta.md', 'r') as f:
              content = f.read()
          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT']),
              scopes=['https://www.googleapis.com/auth/documents']
          )
          service = build('docs', 'v1', credentials=creds)
          doc = service.documents().get(documentId=DOC_ID).execute()
          end_index = doc['body']['content'][-1]['endIndex'] - 1
          requests = []
          if end_index > 1:
              requests.append({'deleteContentRange': {'range': {'startIndex': 1, 'endIndex': end_index}}})
          requests.append({'insertText': {'location': {'index': 1}, 'text': content}})
          service.documents().batchUpdate(documentId=DOC_ID, body={'requests': requests}).execute()
          print(f'Mirror updated successfully ({len(content)} chars)')
          EOF
